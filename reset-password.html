<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Blegab Luxury Wigs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="assets/images/farvicon.webp" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body class="auth-body">
  <main class="auth">
    <section class="auth__panel">
      <button type="button" class="auth__back" aria-label="Go back" onclick="window.location.href='verify-code.html' + window.location.search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="auth__content">
        <h1 class="auth__title">Create New<span class="auth__title-accent">Password</span></h1>
        <p class="auth__success-highlight is-visible" data-reset-highlight>Code verified</p>
        <p class="auth__success is-visible" data-reset-message></p>

        <form class="auth__form" id="reset-password-form" novalidate>
          <p class="auth__error" data-auth-error role="alert"></p>

          <div class="auth__field auth__field--password">
            <svg class="auth__field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="4" y="11" width="16" height="9" rx="2"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke-linecap="round"/>
            </svg>
            <input type="password" id="reset-new-password" placeholder="New Password" autocomplete="new-password" minlength="8" required />
            <button type="button" class="auth__toggle-visibility" data-toggle-password aria-pressed="false" aria-label="Show password">
              <svg class="auth__eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="auth__eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M17.9 17.9A10.6 10.6 0 0 1 12 19c-7 0-11-7-11-7a18.4 18.4 0 0 1 4.2-5.1M9.9 4.2A9.6 9.6 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.2 3.1" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9.5 9.5a3 3 0 0 0 4.2 4.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 1l22 22" stroke-linecap="round"/>
              </svg>
            </button>
          </div>

          <div class="auth__field auth__field--password">
            <svg class="auth__field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="4" y="11" width="16" height="9" rx="2"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke-linecap="round"/>
            </svg>
            <input type="password" id="reset-confirm-password" placeholder="Confirm New Password" autocomplete="new-password" minlength="8" required />
            <button type="button" class="auth__toggle-visibility" data-toggle-password aria-pressed="false" aria-label="Show password">
              <svg class="auth__eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="auth__eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M17.9 17.9A10.6 10.6 0 0 1 12 19c-7 0-11-7-11-7a18.4 18.4 0 0 1 4.2-5.1M9.9 4.2A9.6 9.6 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.2 3.1" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9.5 9.5a3 3 0 0 0 4.2 4.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1 1l22 22" stroke-linecap="round"/>
              </svg>
            </button>
          </div>

          <button type="submit" class="btn btn-primary auth__submit" data-reset-submit>
            <span class="auth__submit-text">Reset Password</span>
            <span class="auth__spinner" data-reset-spinner hidden aria-hidden="true"></span>
          </button>
        </form>

        <p class="auth__switch">Remember your password? <a href="login.html">Sign In</a></p>
      </div>
    </section>
    <aside class="auth__media" role="img" aria-label="Woman wearing a Blegab luxury body wave wig"></aside>
  </main>

  <div class="modal-overlay" data-success-modal hidden>
    <div class="modal-box">
      <div class="modal-box__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true">
          <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 class="modal-box__title">Password Changed</h2>
      <p class="modal-box__text">Your password has been changed successfully. You can now sign in with your new password.</p>
      <button type="button" class="btn btn-primary modal-box__btn" data-modal-continue>Go to Sign In</button>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
