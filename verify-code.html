<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Code | Blegab Luxury Wigs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="assets/images/farvicon.webp" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body class="auth-body">
  <main class="auth">
    <section class="auth__panel">
      <button type="button" class="auth__back" aria-label="Go back" onclick="window.location.href='forgot-password.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="auth__content">
        <h1 class="auth__title">Enter Your<span class="auth__title-accent">Verification Code</span></h1>
        <p class="auth__subtitle">We've sent a code to the email address below. Enter it to continue.</p>

        <form class="auth__form" id="verify-code-form" novalidate>
          <p class="auth__error" data-auth-error role="alert"></p>

          <div class="auth__field">
            <svg class="auth__field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <path d="M3 7l9 6 9-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="email" id="verify-email" placeholder="Email Address" disabled />
          </div>

          <button type="button" class="auth__edit-email" data-edit-email>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Edit email
          </button>

          <div class="auth__field">
            <svg class="auth__field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="4" y="11" width="16" height="9" rx="2"/>
              <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke-linecap="round"/>
            </svg>
            <input type="text" id="verify-code" placeholder="Enter verification code" inputmode="numeric" autocomplete="one-time-code" required />
          </div>

          <button type="submit" class="btn btn-primary auth__submit" data-verify-submit>
            <span class="auth__submit-text">Continue</span>
            <span class="auth__spinner" data-verify-spinner hidden aria-hidden="true"></span>
          </button>
        </form>

        <p class="auth__switch">Remember your password? <a href="login.html">Sign In</a></p>
      </div>
    </section>

    <aside class="auth__media" role="img" aria-label="Woman wearing a Blegab luxury body wave wig"></aside>
  </main>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
